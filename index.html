<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Terminal Quest 🎮</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--surface3:#475569;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#7c3aed;--accent2:#a855f7;
  --gold:#fbbf24;--green:#10b981;--red:#f43f5e;--blue:#38bdf8;
  --orange:#f97316;--teal:#14b8a6;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}
#app{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative;}

/* NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:600px;background:var(--surface);
  border-top:1px solid var(--surface2);display:flex;z-index:100;
}
.nav-btn{
  flex:1;padding:10px 4px 14px;background:none;border:none;color:var(--muted);
  font-size:10px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:color .2s;
}
.nav-btn .icon{font-size:20px;}
.nav-btn.active{color:var(--accent2);}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1e1b4b,#1e293b);
  padding:16px 16px 12px;border-bottom:1px solid var(--surface2);
  position:sticky;top:0;z-index:50;
}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--accent2);}
.xp-chip{background:var(--surface2);border-radius:20px;padding:5px 12px;
  font-size:13px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:5px;}
.xp-bar-wrap{background:var(--surface2);border-radius:8px;height:6px;overflow:hidden;}
.xp-bar{height:100%;border-radius:8px;transition:width .5s ease;
  background:linear-gradient(90deg,var(--accent),var(--accent2));}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}

/* CARDS */
.card{
  background:var(--surface);border-radius:16px;margin:12px 14px;
  border:1px solid var(--surface2);overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(0.98);}
.card.locked{opacity:0.45;cursor:not-allowed;}
.card-inner{padding:16px;}
.level-banner{height:5px;}
.level-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.level-badge{font-size:36px;line-height:1;}
.level-num{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.level-title{font-size:19px;font-weight:800;margin-bottom:2px;}
.level-theme{font-size:13px;color:var(--muted);}
.level-progress{display:flex;align-items:center;gap:8px;margin-top:12px;}
.mini-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.mini-bar{height:100%;border-radius:4px;transition:width .5s;}
.level-stats{font-size:12px;color:var(--muted);}
.lock-badge{font-size:24px;opacity:0.6;}
.complete-badge{background:var(--green);color:#fff;border-radius:8px;
  font-size:11px;font-weight:700;padding:3px 10px;}

/* MISSION LIST */
.back-btn{
  display:flex;align-items:center;gap:6px;padding:14px 16px 6px;
  background:none;border:none;color:var(--accent2);font-size:15px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.level-hero{padding:12px 16px 16px;border-bottom:1px solid var(--surface2);}
.level-hero-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.level-hero-sub{font-size:14px;color:var(--muted);}
.mission-list{padding:8px 0;}
.mission-row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:none;border:none;width:100%;text-align:left;cursor:pointer;
  border-bottom:1px solid var(--surface2);color:var(--text);
  -webkit-tap-highlight-color:transparent;transition:background .15s;
}
.mission-row:active{background:var(--surface2);}
.mission-icon{
  width:40px;height:40px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
  border:2px solid var(--surface2);
}
.mission-icon.done{border-color:var(--green);background:rgba(16,185,129,0.12);}
.mission-icon.boss{border-color:var(--gold);}
.mission-text{flex:1;min-width:0;}
.mission-title-row{display:flex;align-items:center;gap:6px;}
.mission-name{font-size:15px;font-weight:600;}
.boss-tag{background:var(--gold);color:#000;border-radius:4px;
  font-size:10px;font-weight:800;padding:1px 6px;letter-spacing:0.5px;}
.mission-xp{font-size:12px;color:var(--muted);}
.mission-arrow{color:var(--muted);font-size:18px;flex-shrink:0;}

/* MISSION DETAIL */
.mission-header{
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  padding:16px;border-bottom:1px solid var(--surface2);
}
.mission-header-emoji{font-size:32px;margin-bottom:8px;}
.mission-header-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.mission-header-meta{font-size:13px;color:var(--muted);}
.section{padding:16px;}
.section-label{
  font-size:11px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--accent2);margin-bottom:10px;
}
.explanation{font-size:15px;line-height:1.75;color:var(--text);}
.explanation code{
  background:var(--surface2);color:var(--blue);
  padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;
}
.code-block{
  background:#0d1117;border:1px solid var(--surface2);border-radius:10px;
  padding:14px;overflow-x:auto;margin:0;
}
.code-block pre{
  font-family:'Fira Code','Courier New',Courier,monospace;
  font-size:13px;line-height:1.7;color:#c9d1d9;white-space:pre;
}
.code-block .comment{color:#6e7681;}
.code-block .cmd{color:#79c0ff;}

/* CROSS-REFERENCE TABLE */
.cross-table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0;}
.cross-table th{background:var(--surface2);padding:8px 10px;text-align:left;
  font-size:11px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;}
.cross-table td{padding:8px 10px;border-bottom:1px solid var(--surface2);vertical-align:middle;}
.cross-table tr:last-child td{border-bottom:none;}
.cross-table .cmd-cell{font-family:monospace;font-size:12px;color:var(--blue);}
.cross-table .yes{color:var(--green);font-weight:700;text-align:center;}
.cross-table .no{color:var(--red);font-weight:700;text-align:center;}
.cross-table .partial{color:var(--gold);font-weight:700;text-align:center;font-size:11px;}
.cross-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--surface2);}
.cross-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.cross-legend span{font-size:12px;color:var(--muted);}

/* QUIZ */
.quiz-box{
  background:var(--surface);border-radius:16px;border:1px solid var(--surface2);
  margin:0 16px 16px;overflow:hidden;
}
.quiz-q{padding:14px 16px;font-size:15px;font-weight:600;
  border-bottom:1px solid var(--surface2);line-height:1.5;}
.quiz-options{padding:8px;}
.quiz-opt{
  width:100%;background:none;border:none;color:var(--text);
  text-align:left;padding:12px 14px;border-radius:10px;font-size:14px;
  cursor:pointer;margin-bottom:4px;border:2px solid transparent;
  transition:all .15s;display:block;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
.quiz-opt:hover:not(.answered){background:var(--surface2);}
.quiz-opt.correct{background:rgba(16,185,129,0.15);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:rgba(244,63,94,0.15);border-color:var(--red);color:var(--red);}
.quiz-opt.unselected-correct{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.4);}
.quiz-feedback{
  padding:12px 14px;font-size:14px;font-weight:600;
  border-top:1px solid var(--surface2);display:flex;align-items:center;gap:8px;
}
.quiz-feedback.good{color:var(--green);}
.quiz-feedback.bad{color:var(--red);}

/* COMPLETE BUTTON */
.complete-btn{
  width:calc(100% - 32px);margin:0 16px 16px;padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:14px;font-size:17px;
  font-weight:800;cursor:pointer;letter-spacing:0.3px;
  -webkit-tap-highlight-color:transparent;transition:opacity .2s;
}
.complete-btn:active{opacity:0.85;}
.complete-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.already-done{
  width:calc(100% - 32px);margin:0 16px 16px;padding:14px;
  background:rgba(16,185,129,0.12);border:2px solid var(--green);
  border-radius:14px;font-size:15px;font-weight:700;
  color:var(--green);text-align:center;
}

/* HOME SCREEN */
.home-hero{text-align:center;padding:24px 16px 16px;}
.home-hero h1{font-size:26px;font-weight:900;margin-bottom:6px;}
.home-hero p{font-size:14px;color:var(--muted);max-width:300px;margin:0 auto;}
.section-title{font-size:13px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);padding:8px 16px 0;}

/* CHEATSHEET */
.cheat-search{
  margin:12px 14px;display:flex;gap:8px;
  background:var(--surface);border:1px solid var(--surface2);
  border-radius:12px;overflow:hidden;align-items:center;padding:0 12px;
}
.cheat-search input{
  flex:1;background:none;border:none;color:var(--text);
  font-size:15px;padding:12px 0;outline:none;
}
.cheat-search input::placeholder{color:var(--muted);}
.cheat-cat{padding:8px 16px 4px;font-size:11px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);}
.cheat-row{
  display:flex;align-items:flex-start;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--surface2);
}
.cheat-cmd{
  background:var(--surface2);border-radius:6px;padding:4px 10px;
  font-family:monospace;font-size:13px;color:var(--blue);
  flex-shrink:0;max-width:180px;word-break:break-all;
}
.cheat-desc{font-size:13px;color:var(--muted);line-height:1.4;padding-top:4px;}

/* BADGES */
.badges-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;}
.badge-card{
  background:var(--surface);border:1px solid var(--surface2);
  border-radius:14px;padding:20px 14px;text-align:center;
}
.badge-card.earned{border-color:var(--gold);background:rgba(251,191,36,0.05);}
.badge-card.locked{opacity:0.4;}
.badge-emoji{font-size:42px;margin-bottom:8px;}
.badge-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.badge-level{font-size:11px;color:var(--muted);}
.badge-status{font-size:11px;margin-top:6px;font-weight:700;}
.badge-status.earned{color:var(--gold);}
.badge-status.locked{color:var(--muted);}

/* ═══ TERMINAL SIMULATOR ═══ */
.term-wrap{
  display:flex;flex-direction:column;height:calc(100vh - 80px);
  font-family:'Fira Code','Courier New',monospace;
}
.term-toolbar{
  background:var(--surface);border-bottom:1px solid var(--surface2);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
}
.term-toolbar-title{font-size:14px;font-weight:700;}
.term-mode-badge{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;
  background:rgba(16,185,129,0.15);color:var(--green);border:1px solid var(--green);
}
.term-mode-badge.ai-mode{
  background:rgba(168,85,247,0.15);color:var(--accent2);border-color:var(--accent2);
}
.term-hint{
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);
  border-radius:8px;margin:8px 10px;padding:8px 12px;
  font-size:12px;color:var(--blue);line-height:1.5;font-family:sans-serif;
}
.term-hint strong{color:var(--blue);}
.term-output{
  flex:1;overflow-y:auto;padding:12px 14px;background:#090e1a;
  font-size:13px;line-height:1.7;
}
.term-line{white-space:pre-wrap;word-break:break-all;}
.term-line.prompt{color:#7c3aed;}
.term-line.prompt span{color:#a855f7;}
.term-line.prompt .ai-prompt{color:#a855f7;}
.term-line.output{color:#c9d1d9;}
.term-line.error{color:#f43f5e;}
.term-line.success{color:#10b981;}
.term-line.info{color:#38bdf8;}
.term-line.ai-response{color:#e2d9f3;}
.term-line.dim{color:#475569;}
.term-input-row{
  display:flex;align-items:center;gap:0;
  background:#090e1a;border-top:1px solid var(--surface2);
  padding:10px 14px;
}
.term-prompt-label{color:#a855f7;font-size:13px;white-space:nowrap;flex-shrink:0;}
.term-input{
  flex:1;background:none;border:none;outline:none;
  color:#e2e8f0;font-family:'Fira Code','Courier New',monospace;
  font-size:13px;padding:0 6px;caret-color:#a855f7;
}
.term-send{
  background:none;border:none;color:var(--accent2);
  font-size:18px;cursor:pointer;padding:0 4px;
  -webkit-tap-highlight-color:transparent;
}
.term-clear-btn{
  background:var(--surface2);border:none;color:var(--muted);
  border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* UTIL */
.divider{height:1px;background:var(--surface2);margin:0 16px;}
.spacer{height:12px;}
.tag{display:inline-block;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;}
.info-box{
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);
  border-radius:10px;padding:12px 14px;margin:8px 0;
  font-size:14px;line-height:1.6;color:var(--text);
}
.info-box .info-label{font-size:11px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:var(--blue);margin-bottom:6px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════
// VIRTUAL FILESYSTEM FOR TERMINAL SIMULATOR
// ═══════════════════════════════════════════════════
const VFS = {
  '~': ['Desktop/', 'Documents/', 'Downloads/', 'notes.txt'],
  '~/Desktop': ['my-quest/'],
  '~/Desktop/my-quest': ['journal.txt', 'about.md', 'CLAUDE.md', '.git/'],
  '~/Documents': [],
  '~/Downloads': [],
};
const VFS_FILES = {
  '~/notes.txt': 'Remember:\n  cd to navigate\n  ls to list\n  pwd to see where you are\n\nGood luck on your quest! 🎮',
  '~/Desktop/my-quest/journal.txt': 'My terminal learning journey\n\n[Entry 1]\nToday I learned how to use pwd and ls.\nSmall steps!',
  '~/Desktop/my-quest/about.md': '# About Me\n\nLearning terminal, git, and Claude Code.\nThis file was created during my quest.',
  '~/Desktop/my-quest/CLAUDE.md': '# My Quest Project\n\n## About\nLearning terminal with Terminal Quest app.\n\n## Rules\n- Always explain before changing files\n- Keep code simple',
};

let termCwd = '~';
let termGitInited = false;
let termMode = 'shell'; // 'shell' or 'claude'
let termHistory = [];
let termHistoryIdx = -1;
let termGitStaged = false;
let termLines = [];
let termCommits = [
  {hash:'a1b2c3d', msg:'Initial commit', author:'Swati Gupta'}
];

function termPath(dir) {
  if (dir === '~') return '/home/swati';
  return '/home/swati/' + dir.replace('~/', '');
}

function termPrompt() {
  if (termMode === 'claude') return 'claude> ';
  return `swati@quest:${termCwd}$ `;
}

function termAddLine(text, cls='output') {
  termLines.push({text, cls});
}

function termRender() {
  const out = document.getElementById('term-out');
  if (!out) return;
  out.innerHTML = termLines.map(l => `<div class="term-line ${l.cls}">${escapeHtml(l.text)}</div>`).join('');
  out.scrollTop = out.scrollHeight;
  // Update mode badge
  const badge = document.getElementById('term-mode-badge');
  if (badge) {
    badge.textContent = termMode === 'claude' ? '🤖 Claude Code' : '🟢 Shell';
    badge.className = 'term-mode-badge' + (termMode === 'claude' ? ' ai-mode' : '');
  }
  // Update prompt label
  const pl = document.getElementById('term-prompt-label');
  if (pl) pl.textContent = termPrompt();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const CLAUDE_RESPONSES = [
  "I can see your project files. What would you like me to help with?",
  "Sure! I'll read the files in this directory and suggest improvements.",
  "Great question. The `git status` shows you're on the main branch with no uncommitted changes.",
  "I've analyzed the structure. Want me to create an index.html?",
  "I can run bash commands for you — just describe what you need in plain English.",
  "I see CLAUDE.md — I've read it and understand the project context.",
  "To fix that, I'd suggest running `git add .` then `git commit -m 'your message'`.",
  "Token tip: use /compact if our conversation gets long — it summarizes and frees context.",
];
let claudeResponseIdx = 0;

function handleTermCommand(input) {
  const raw = input.trim();
  if (!raw) return;

  // Add to history
  termHistory.unshift(raw);
  if (termHistory.length > 50) termHistory.pop();
  termHistoryIdx = -1;

  // Show the command in prompt style
  termAddLine(termPrompt() + raw, 'prompt');

  if (termMode === 'claude') {
    handleClaudeMode(raw);
    return;
  }

  // Parse command and args
  const parts = raw.split(/\s+/);
  const cmd = parts[0];
  const args = parts.slice(1);

  // SHELL MODE
  switch(cmd) {
    case 'pwd':
      termAddLine(termPath(termCwd));
      break;
    case 'ls': {
      const flag = args.includes('-la') || args.includes('-l');
      const entries = VFS[termCwd] || [];
      if (entries.length === 0) {
        termAddLine('(empty directory)','dim');
      } else if (flag) {
        termAddLine('total ' + (entries.length * 4));
        entries.forEach(e => {
          const isDir = e.endsWith('/');
          const perms = isDir ? 'drwxr-xr-x' : '-rw-r--r--';
          termAddLine(`${perms}  swati  swati  ${e}`);
        });
        if (flag) {
          termAddLine('-rw-r--r--  swati  swati  .hidden-example','dim');
        }
      } else {
        termAddLine(entries.join('  '));
      }
      break;
    }
    case 'cd': {
      const target = args[0] || '~';
      let newDir;
      if (target === '~' || target === '') newDir = '~';
      else if (target === '..') {
        const parts2 = termCwd.split('/');
        parts2.pop();
        newDir = parts2.join('/') || '~';
      } else if (target === '-') {
        termAddLine('(previous directory)','dim');
        break;
      } else {
        newDir = termCwd === '~' ? `~/${target.replace('/','').replace('~/','')}` : `${termCwd}/${target.replace('/','').replace('~/','')}`;
        newDir = newDir.replace('~//','~/');
        if (!VFS[newDir]) {
          termAddLine(`cd: no such file or directory: ${target}`,'error');
          break;
        }
      }
      termCwd = newDir;
      break;
    }
    case 'mkdir': {
      if (!args[0]) { termAddLine('mkdir: missing operand','error'); break; }
      const newDir2 = `${termCwd}/${args[0]}`;
      if (!VFS[termCwd]) VFS[termCwd] = [];
      const dirName = args[0] + '/';
      if (!VFS[termCwd].includes(dirName)) VFS[termCwd].push(dirName);
      VFS[newDir2] = [];
      termAddLine('','dim');
      break;
    }
    case 'touch': {
      if (!args[0]) { termAddLine('touch: missing operand','error'); break; }
      if (!VFS[termCwd]) VFS[termCwd] = [];
      if (!VFS[termCwd].includes(args[0])) VFS[termCwd].push(args[0]);
      VFS_FILES[`${termCwd}/${args[0]}`] = '';
      break;
    }
    case 'cat': {
      if (!args[0]) { termAddLine('cat: missing operand','error'); break; }
      const fkey = `${termCwd}/${args[0]}`;
      if (VFS_FILES[fkey] !== undefined) {
        termAddLine(VFS_FILES[fkey] || '(empty file)');
      } else {
        termAddLine(`cat: ${args[0]}: No such file or directory`,'error');
      }
      break;
    }
    case 'rm': {
      if (!args[0]) { termAddLine('rm: missing operand','error'); break; }
      const fname = args[args.length-1];
      if (VFS[termCwd]) {
        VFS[termCwd] = VFS[termCwd].filter(f => f !== fname && f !== fname + '/');
      }
      delete VFS_FILES[`${termCwd}/${fname}`];
      break;
    }
    case 'echo': {
      termAddLine(args.join(' '));
      break;
    }
    case 'whoami':
      termAddLine('swati');
      break;
    case 'date':
      termAddLine(new Date().toDateString() + ' ' + new Date().toLocaleTimeString());
      break;
    case 'clear':
      termLines = [];
      termRender();
      return;
    case 'git':
      handleGitCommand(args);
      break;
    case 'npm': {
      if (raw.includes('install') && raw.includes('claude-code')) {

function handleGitCommand(args) {
  const sub = args[0];
  switch(sub) {
    case '--version':
      termAddLine('git version 2.43.0'); break;
    case 'init':
      termGitInited = true;
      termAddLine(`Initialized empty Git repository in ${termPath(termCwd)}/.git/`,'success');
      if (!VFS[termCwd]) VFS[termCwd] = [];
      if (!VFS[termCwd].includes('.git/')) VFS[termCwd].push('.git/');
      break;
    case 'status':
      if (!termGitInited) {
        termAddLine('fatal: not a git repository (or any of the parent directories): .git','error');
        termAddLine('Tip: run `git init` first to create a repo','dim');
      } else if (termGitStaged) {
        termAddLine('On branch main');
        termAddLine('Changes staged for commit:');
        termAddLine('  (use "git restore --staged <file>" to unstage)');
        termAddLine('');
        termAddLine('\tmodified:   journal.txt','success');
      } else {
        termAddLine('On branch main');
        termAddLine("Your branch is up to date with 'origin/main'.");
        termAddLine('');
        termAddLine('nothing to commit, working tree clean');
      }
      break;
    case 'add':
      if (!termGitInited) { termAddLine('fatal: not a git repository','error'); break; }
      termGitStaged = true;
      break;
    case 'commit': {
      if (!termGitInited) { termAddLine('fatal: not a git repository','error'); break; }
      const mIdx = args.indexOf('-m');
      const msg = mIdx >= 0 ? (args[mIdx+1] || 'update').replace(/"/g,'') : 'update';
      const hash = Math.random().toString(16).substr(2,7);
      termCommits.unshift({hash, msg, author:'Swati Gupta'});
      termGitStaged = false;
      termAddLine(`[main ${hash}] ${msg}`,'success');
      termAddLine(' 1 file changed, 1 insertion(+)');
      break;
    }
    case 'log':
      termCommits.slice(0,4).forEach((c,i) => {
        termAddLine(`commit ${c.hash}${i===0?' (HEAD -> main)':''}`, 'info');
        termAddLine(`Author: ${c.author} <guptaharshita1990@gmail.com>`);
        termAddLine(`Date:   ${new Date().toDateString()}`);
        termAddLine('');
        termAddLine(`    ${c.msg}`);
        if (i < termCommits.length-1) termAddLine('','dim');
      });
      termAddLine('(end — press q in real terminal to quit log)','dim');
      break;
    case 'push':
      if (!termGitInited) { termAddLine('fatal: not a git repository','error'); break; }
      termAddLine('Enumerating objects: 3, done.','dim');
      termAddLine('Counting objects: 100% (3/3), done.','dim');
      termAddLine('Writing objects: 100% (3/3), done.','dim');
      termAddLine('To github.com:swati/my-quest.git','success');
      termAddLine('   a1b2c3d..abc1234  main -> main','success');
      break;
    case 'pull':
      termAddLine("Already up to date.",'success'); break;
    case 'clone':
      termAddLine(`Cloning into '${(args[1]||'repo').split('/').pop()}'...`,'info');
      termAddLine('remote: Counting objects: done.','dim');
      termAddLine('Receiving objects: 100%','success');
      break;
    case 'remote':
      if (args[1]==='add') {
        termAddLine('(remote added: ' + (args[3]||args[2]||'origin') + ')','success');
      } else {
        termAddLine('origin');
      }
      break;
    case 'config':
      if (args.includes('user.name') && args[args.length-1] !== 'user.name') {
        termAddLine('(global user.name set to: ' + args[args.length-1].replace(/"/g,'') + ')','success');
      } else if (args.includes('user.email') && args[args.length-1] !== 'user.email') {
        termAddLine('(global user.email set)','success');
      } else {
        termAddLine('Swati Gupta');
      }
      break;
    case 'diff':
      termAddLine('diff --git a/journal.txt b/journal.txt');
      termAddLine('--- a/journal.txt');
      termAddLine('+++ b/journal.txt');
      termAddLine('-My terminal learning journey','error');
      termAddLine('+My terminal learning journey ✓','success');
      break;
    case 'branch':
      termAddLine('* main'); break;
    case 'checkout':
      termAddLine(`Switched to branch '${args[1]||'main'}'`,'success'); break;
    default:
      termAddLine(`git: '${sub}' is not a git command. Try: init status add commit log push pull clone config`,'error');
  }
}

function handleClaudeMode(input) {
  if (input.startsWith('/')) {
    const slash = input.split(' ')[0];
    switch(slash) {
      case '/exit':
        termMode = 'shell';
        termAddLine('');
        termAddLine('Exited Claude Code. Back in shell.','dim');
        break;
      case '/clear':
        termLines = termLines.slice(0, termLines.length - 1);
        termAddLine('(conversation cleared — tokens freed)','success');
        break;
      case '/cost':
        termAddLine('Session usage:','info');
        termAddLine('  Input tokens:  1,247');
        termAddLine('  Output tokens:   834');
        termAddLine('  Estimated cost: ~$0.002');
        termAddLine('Tip: /compact to summarize and reduce context','dim');
        break;
      case '/compact':
        termAddLine('✓ Conversation summarized. Context reduced by ~60%.','success'); break;
      case '/help':
        termAddLine('Claude Code slash commands:','info');
        termAddLine('  /help     — show this help');
        termAddLine('  /clear    — clear conversation history (frees tokens)');
        termAddLine('  /cost     — show token usage for this session');
        termAddLine('  /compact  — summarize conversation to save context');
        termAddLine('  /exit     — return to normal terminal');
        termAddLine('');
        termAddLine('⚠️  These slash commands ONLY work inside Claude Code.','dim');
        termAddLine('    They do NOT work in regular terminal or Cowork.','dim');
        break;
      default:
        termAddLine(`Unknown slash command: ${slash}. Try /help`,'error');
    }
  } else {
    // Simulate Claude response
    const response = CLAUDE_RESPONSES[claudeResponseIdx % CLAUDE_RESPONSES.length];
    claudeResponseIdx++;
    termAddLine('');
    termAddLine('Claude: ' + response, 'ai-response');
    termAddLine('');
  }
}

    {id:"3.3",title:"Pipes — Chain Commands Together",isBoss:false,xp:20,
      explanation:`The pipe character \`|\` sends the output of one command as input to another. It's one of the most powerful concepts in the terminal.

Pipes work in WSL, Git Bash, AND PowerShell — another cross-functional concept!`,
      example:`# Count how many files in a folder:
$ ls | wc -l

# Find "error" in a process list:
$ ps aux | grep "node"

# Search git log:
$ git log | grep "fix"

# Works in PowerShell too:
PS> dir | Where-Object {$_.Name -like "*.txt"}`,
      quiz:{question:"What does the pipe | character do?",options:["Deletes files","Sends output of one command to the next","Creates a new file","Opens an editor"],correct:1}
    },
    {id:"3.4",title:"Redirect Output — > and >>",isBoss:false,xp:15,
      explanation:`Save command output to a file instead of printing it to the screen:

• \`>\` writes output to a file (creates or overwrites)
• \`>>\` appends to a file (adds to the end, never overwrites)

Both work in WSL, Git Bash, AND PowerShell!`,
      example:`# Save ls output to a file:
$ ls > filelist.txt

# Add to an existing file (append):
$ echo "New entry" >> notes.txt

# Save git log to a file:
$ git log > history.txt

# Check the result:
$ cat filelist.txt`,
      quiz:{question:"What's the difference between > and >>?",options:["No difference","> overwrites; >> appends","> appends; >> overwrites","> creates; >> deletes"],correct:1}
    },
    {id:"3.5",title:"Environment Variables",isBoss:false,xp:20,
      explanation:`Environment variables are like global settings your terminal and apps can read. They store API keys, folder paths, and config values.

Important: Claude Code needs your Anthropic API key stored as an environment variable!

The syntax differs between WSL/Git Bash and PowerShell.`,
      example:`# Set a variable (WSL / Git Bash):
$ export MY_KEY="abc123"
$ echo $MY_KEY
abc123

# Set a variable (PowerShell):
PS> $env:MY_KEY = "abc123"
PS> echo $env:MY_KEY
abc123

# Make it permanent (WSL — add to ~/.bashrc):
$ echo 'export ANTHROPIC_API_KEY="your-key"' >> ~/.bashrc
$ source ~/.bashrc`,
      quiz:{question:"How do you read an environment variable in WSL/Git Bash?",options:["get $VARIABLE","read VARIABLE","echo $VARIABLE","print %VARIABLE%"],correct:2}
    },
    {id:"3.6",title:"Your Shell Profile",isBoss:false,xp:20,
      explanation:`Your shell profile is a file that runs every time you open a terminal. It's where you put shortcuts (aliases), environment variables, and settings you want to always be available.

• WSL/Git Bash: \`~/.bashrc\` or \`~/.bash_profile\`
• PowerShell: \`$PROFILE\` (a file path shown by this command)`,
      example:`# Edit your bash profile (WSL/Git Bash):
$ nano ~/.bashrc

# Add this line to create a shortcut:
alias ll='ls -la'
alias gs='git status'

# Apply changes without restarting:
$ source ~/.bashrc

# Now 'gs' works as a shortcut for git status!

# PowerShell equivalent:
PS> notepad $PROFILE`,
      quiz:{question:"What command applies changes to ~/.bashrc without restarting the terminal?",options:["apply ~/.bashrc","source ~/.bashrc","reload shell","bash --restart"],correct:1}
    },
    {id:"3.7",title:"Package Managers",isBoss:false,xp:20,
      explanation:`Package managers install tools and libraries from the internet:

• \`npm\` — installs Node.js packages (works on Windows, Mac, Linux)
• \`pip\` — installs Python libraries (works everywhere)
• \`apt\` — installs Ubuntu packages (WSL only)
• \`winget\` — installs Windows apps (PowerShell)
• \`brew\` — Mac package manager (not on Windows)

Claude Code itself is installed via npm — the same on all platforms!`,
      example:`# Install Claude Code (works on Windows WSL/Git Bash):
$ npm install -g @anthropic-ai/claude-code

# Install a Python library:
$ pip install requests

# Install git in WSL:
$ sudo apt install git

# Check npm packages installed:
$ npm list -g --depth=0

# Windows app via winget:
PS> winget install Git.Git`,
      quiz:{question:"Which package manager installs Claude Code?",options:["brew","pip","npm","apt"],correct:2}
    },
    {id:"3.8",title:"File Permissions (chmod)",isBoss:false,xp:15,
      explanation:`In Linux/WSL, every file has permissions — who can read, write, or execute it.

\`ls -la\` shows permissions as a string like \`-rw-r--r--\`.
\`chmod\` changes permissions.

You mainly need this in WSL. PowerShell has its own permission system (ACLs).`,
      example:`# See permissions:
$ ls -la
-rw-r--r--  notes.txt   # you can read+write, others can only read
-rwxr-xr-x  script.sh   # everyone can execute (run) this

# Make a script executable:
$ chmod +x script.sh
$ ./script.sh    # now you can run it

# Read/write for owner only:
$ chmod 600 .env`,
      quiz:{question:"What does `chmod +x script.sh` do?",options:["Deletes the script","Copies the script","Makes the script executable (runnable)","Encrypts the script"],correct:2}
    },
    {id:"3.9",title:"⚔️ Boss Challenge",isBoss:true,xp:120,
      explanation:`Prove your Ninja skills! In WSL or Git Bash:

4. Use \`grep\` to search a file for any word
5. Use a pipe: \`ls | wc -l\` to count files in a folder
6. Set an environment variable and echo it back

You've earned the Ninja badge! 🥷`,
      example:`# 1. Add alias to profile:
$ echo "alias gs='git status'" >> ~/.bashrc
$ source ~/.bashrc

# 2. Test it:
$ gs
On branch main...

# 3. Use grep:
$ grep "learn" notes.txt

# 4. Use a pipe:
$ ls | wc -l
5

# 5. Env variable:
$ export MY_TEST="hello"
$ echo $MY_TEST
hello`,
      quiz:{question:"After editing ~/.bashrc, how do you apply changes without restarting?",options:["restart terminal","source ~/.bashrc","apply bash","refresh shell"],correct:1}
    }
  ]
},

    {id:"5.1",title:"What Are Tokens?",isBoss:false,xp:20,
      explanation:`Tokens are how AI models measure text. A token is roughly ¾ of a word — "Hello world" is about 3 tokens.

Every message you send AND every reply Claude gives uses tokens. In Claude Code, every time Claude reads your files to understand context, those files cost tokens too.

This is why large files and long conversations get expensive.`,
      example:`# Token examples (approximate):
"Hello"             = 1 token
"Hello world!"      = 3 tokens
"git status"        = 2 tokens

# A 200-line Python file
≈ 1,000-2,000 tokens

# A long Claude Code conversation
with many file reads ≈ 10,000+ tokens`,
      quiz:{question:"Roughly how many tokens is a single word?",options:["1 token","About 0.75 tokens","5 tokens","10 tokens"],correct:1}
    },
    {id:"5.2",title:"Context Window",isBoss:false,xp:20,
      explanation:`The context window is how much Claude can "hold in mind" at once. It's measured in tokens.

When a conversation gets too long, older messages fall out of context — Claude "forgets" things you said earlier. This is why \`/compact\` is useful in long Claude Code sessions.

In Cowork/Claude Desktop, a new session starts fresh context. In Claude Code, \`/clear\` or \`/compact\` resets or summarizes the context.`,
      example:`# Context fills up when:
- Your conversation is long
- Claude reads many large files
- You paste in lots of code

# Signs context is full:
- Claude "forgets" earlier instructions
- Responses become less accurate

# Fix it in Claude Code:
claude> /compact   # summarize to free space
claude> /clear     # start fresh (loses history)

# Prevention:
- Use .claudeignore for big files
- Work in focused sessions
- Use CLAUDE.md for persistent context`,
      quiz:{question:"What does /compact do in Claude Code?",options:["Deletes your files","Compresses your code","Summarizes conversation to free up context space","Reduces your API bill instantly"],correct:2}
    },

      explanation:`Smart habits to keep Claude Code costs low:

      explanation:`Just like \`.gitignore\` tells Git which files to skip, \`.claudeignore\` tells Claude Code which files to ignore when reading your project.

      example:`# Create .claudeignore in your project root:

# Add these common patterns:
node_modules/
.env
*.log
dist/
build/
.DS_Store
__pycache__/
*.pyc

# Now Claude Code won't read these files

    },
    {id:"5.6",title:"The CLAUDE.md File",isBoss:false,xp:25,
      explanation:`\`CLAUDE.md\` is a special file in your project root. Claude Code reads it automatically at the start of every session — like a permanent briefing note.

Use it to give Claude persistent context: what the project does, your coding preferences, and what NOT to do.

// ═══════════════════════════════════════════════════
// STATE & PROGRESS
// ═══════════════════════════════════════════════════
function loadProgress(){
  try{return JSON.parse(localStorage.getItem('tq_v2')||'null')||{completed:[],xp:0,badges:[]};}
  catch(e){return{completed:[],xp:0,badges:[]};}
}
function saveProgress(){localStorage.setItem('tq_v2',JSON.stringify(progress));}

let progress = loadProgress();
let view = 'home';
let selLevel = null;
let selMission = null;
let quizSel = null;
let quizDone = false;

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function done(mid){return progress.completed.includes(mid);}
function levelDone(lid){return LEVELS.find(l=>l.id===lid).missions.every(m=>done(m.id));}
function unlocked(lid){return lid===1||levelDone(lid-1);}
function totalXP(){return LEVELS.reduce((s,l)=>s+l.missions.reduce((ms,m)=>ms+(done(m.id)?m.xp:0),0),0);}
function maxXP(){return LEVELS.reduce((s,l)=>s+l.missions.reduce((ms,m)=>ms+m.xp,0),0);}
function levelProgress(lid){
  const l=LEVELS.find(x=>x.id===lid);
  const d=l.missions.filter(m=>done(m.id)).length;
  return{done:d,total:l.missions.length,pct:Math.round(d/l.missions.length*100)};
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  let html='';
  if(view==='home') html=renderHome();
  else if(view==='level') html=renderLevel();
  else if(view==='mission') html=renderMission();
  else if(view==='cheatsheet') html=renderCheatsheet();
  else if(view==='badges') html=renderBadges();
  else if(view==='terminal') html=renderTerminal();
  document.getElementById('app').innerHTML=html+renderNav();
  if(view==='terminal') initTerminal();
  else attachEvents();
  window.scrollTo(0,0);
}

function renderNav(){
  const tabs=[
    {id:'home',label:'Levels',icon:'🗺️'},
    {id:'terminal',label:'Terminal',icon:'🖥️'},
    {id:'cheatsheet',label:'Cheat Sheet',icon:'📋'},
    {id:'badges',label:'Badges',icon:'🏅'},
  ];
  return `<nav class="bottom-nav">${tabs.map(t=>`
    <button class="nav-btn ${view===t.id?'active':''}" data-action="nav" data-value="${t.id}">
      <span class="icon">${t.icon}</span>${t.label}
    </button>`).join('')}</nav>`;
}

function renderHome(){
  const xp=totalXP(), mx=maxXP();
  const pct=mx?Math.round(xp/mx*100):0;
  return `
  <div class="header">
    <div class="header-row">
      <div class="logo">Terminal<span>Quest</span> 🎮</div>
      <div class="xp-chip">⭐ ${xp.toLocaleString()} XP</div>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%"></div></div>
    <div class="xp-label"><span>${pct}% complete</span><span>${mx.toLocaleString()} total XP</span></div>
  </div>
  <div class="home-hero">
    <h1>Your Quest Awaits 🌟</h1>
    <p>Learn Git, Bash & Claude Code — one mission at a time. Use 🖥️ Terminal tab to practice!</p>
  </div>
  <div class="section-title">LEVELS</div>
  ${LEVELS.map(l=>{
    const lp=levelProgress(l.id);
    const isUnlocked=unlocked(l.id);
    const isComplete=levelDone(l.id);
    return `
    <div class="card ${!isUnlocked?'locked':''}" data-action="${isUnlocked?'goto-level':''}" data-value="${l.id}">
      <div class="level-banner" style="background:${l.color}"></div>
      <div class="card-inner">
        <div class="level-meta">
          <div>
            <div class="level-num">Level ${l.id}</div>
            <div class="level-title">${l.emoji} ${l.title}</div>
            <div class="level-theme">${l.theme}</div>
          </div>
          ${!isUnlocked?`<div class="lock-badge">🔒</div>`:
            isComplete?`<div class="complete-badge">✓ DONE</div>`:
            `<div class="level-badge" style="opacity:0.8">${l.emoji}</div>`}
        </div>
        <div class="level-progress">
          <div class="mini-bar-wrap"><div class="mini-bar" style="width:${lp.pct}%;background:${l.color}"></div></div>
          <div class="level-stats">${lp.done}/${lp.total} missions · ${l.xpReward} XP</div>
        </div>
      </div>
    </div>`;
  }).join('')}
  <div class="spacer"></div>`;
}

function renderLevel(){
  if(!selLevel) return renderHome();
  const l=LEVELS.find(x=>x.id===selLevel);
  const lp=levelProgress(selLevel);
  return `
  <button class="back-btn" data-action="nav" data-value="home">← Levels</button>
  <div class="level-hero">
    <div class="level-title" style="color:${l.color};font-size:22px;font-weight:800;">${l.emoji} ${l.title}</div>
    <div class="level-hero-sub">${l.theme} · ${lp.done}/${lp.total} missions complete</div>
  </div>
  <div class="mission-list">
    ${l.missions.map(m=>{
      const isDone=done(m.id);
      return `
      <button class="mission-row" data-action="goto-mission" data-mid="${m.id}">
        <div class="mission-icon ${isDone?'done':''} ${m.isBoss?'boss':''}">
          ${isDone?'✅':m.isBoss?'⚔️':'📜'}
        </div>
        <div class="mission-text">
          <div class="mission-title-row">
            <span class="mission-name">${m.title}</span>
            ${m.isBoss?`<span class="boss-tag">BOSS</span>`:''}
          </div>
          <div class="mission-xp">+${m.xp} XP${isDone?' · completed':''}</div>
        </div>
        <div class="mission-arrow">›</div>
      </button>`;
    }).join('')}
  </div>`;
}

function renderMission(){
  const l=LEVELS.find(lv=>lv.missions.find(m=>m.id===selMission));
  if(!l) return renderHome();
  const m=l.missions.find(x=>x.id===selMission);
  const isDone=done(m.id);
  const canComplete=quizDone&&quizSel===m.quiz.correct;
  const fmtText=(t)=>t.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
  const fmtCode=(c)=>c.replace(/^(#.*)$/gm,'<span class="comment">$1</span>').replace(/^(\$ .+)$/gm,'<span class="cmd">$1</span>');

  return `
  <button class="back-btn" data-action="goto-level-back">← ${l.emoji} ${l.title}</button>
  <div class="mission-header">
    <div class="mission-header-emoji">${m.isBoss?'⚔️':'📜'}</div>
    <div class="mission-header-title">${m.title}</div>
    <div class="mission-header-meta">Mission ${m.id} · +${m.xp} XP${m.isBoss?' · Boss Challenge':''}</div>
  </div>

  <div class="section">
    <div class="section-label">Explanation</div>
    <div class="explanation">${fmtText(m.explanation)}</div>
  </div>

  <div class="section">
    <div class="section-label">Example</div>
    <div class="code-block"><pre>${fmtCode(m.example)}</pre></div>
  </div>

  <div class="section"><div class="section-label">Knowledge Check</div></div>
  <div class="quiz-box">
    <div class="quiz-q">${m.quiz.question}</div>
    <div class="quiz-options">
      ${m.quiz.options.map((opt,i)=>{
        let cls='quiz-opt';
        if(quizDone){
          if(i===m.quiz.correct) cls+=' correct';
          else if(i===quizSel&&quizSel!==m.quiz.correct) cls+=' wrong';
          else cls+=' unselected-correct';
          cls+=' answered';
        }
        return `<button class="${cls}" data-action="quiz" data-i="${i}" ${quizDone?'disabled':''}>
          ${quizDone?(i===m.quiz.correct?'✓ ':'✗ '):''}${opt}
        </button>`;
      }).join('')}
    </div>
    ${quizDone?`<div class="quiz-feedback ${quizSel===m.quiz.correct?'good':'bad'}">
      ${quizSel===m.quiz.correct?'🎉 Correct! Well done!':'💡 Not quite — the correct answer is highlighted above.'}
    </div>`:''}
  </div>

  ${isDone?`<div class="already-done">✅ Mission completed! +${m.xp} XP earned</div>`:
    canComplete?`<button class="complete-btn" data-action="complete">Mark Complete & Claim ${m.xp} XP ⭐</button>`:
    `<button class="complete-btn" disabled>${quizDone?'Answer correctly to complete':'Answer the quiz to continue'}</button>`}
  <div class="spacer"></div>`;
}

  <div class="header">

      <div class="logo">📋 Cheat Sheet</div>

function renderBadges(){
  const xp=totalXP();
  const totalMissions=LEVELS.reduce((s,l)=>s+l.missions.length,0);
  return `
  <div class="header">
    <div class="header-row">
      <div class="logo">🏅 Badges</div>
      <div class="xp-chip">⭐ ${xp.toLocaleString()} XP</div>

  </div>
  <div class="spacer"></div>
  <div class="badges-grid">
    ${LEVELS.map(l=>{
      const earned=progress.badges.includes(l.badge);
      return `
      <div class="badge-card ${earned?'earned':'locked'}">
        <div class="badge-emoji">${l.badgeEmoji}</div>
        <div class="badge-name">${l.badge}</div>
        <div class="badge-level">Level ${l.id}: ${l.title}</div>
        <div class="badge-status ${earned?'earned':'locked'}">${earned?'🌟 Earned!':'🔒 Locked'}</div>
      </div>`;
    }).join('')}
    <div class="badge-card ${progress.completed.length===totalMissions?'earned':'locked'}">
      <div class="badge-emoji">🏆</div>
      <div class="badge-name">Terminal Master</div>
      <div class="badge-level">Complete all 5 levels</div>
      <div class="badge-status ${progress.completed.length===totalMissions?'earned':'locked'}">${progress.completed.length===totalMissions?'🌟 Earned!':'🔒 Locked'}</div>

}

// ═══════════════════════════════════════════════════
// TERMINAL INIT & EVENTS
// ═══════════════════════════════════════════════════
function initTerminal(){
  termRender();
  const input = document.getElementById('term-input');
  const send = document.getElementById('term-send');
  const clearAll = document.getElementById('term-clear-all');

  if (!input) return;

  input.focus();

  function submit(){
    const val = input.value;
    input.value = '';
    handleTermCommand(val);
    termRender();
    input.focus();
  }

  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      submit();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (termHistoryIdx < termHistory.length-1) {
        termHistoryIdx++;
        input.value = termHistory[termHistoryIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (termHistoryIdx > 0) {
        termHistoryIdx--;
        input.value = termHistory[termHistoryIdx];
      } else {
        termHistoryIdx = -1;
        input.value = '';
      }
    }
  });

  send.addEventListener('click', submit);

  clearAll.addEventListener('click', function(){
    termLines = [];
    termRender();
    input.focus();
  });

  // Click anywhere in terminal output to refocus input
  const termOut = document.getElementById('term-out');
  if (termOut) termOut.addEventListener('click', () => input.focus());

  // nav buttons need event delegation from nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const val = this.dataset.value;
      if (val) { view = val; quizSel=null; quizDone=false; render(); }
    });
  });
}

// ═══════════════════════════════════════════════════
// EVENTS (non-terminal views)
// ═══════════════════════════════════════════════════
function attachEvents(){
  document.addEventListener('click', handleClick, {once:true});
}

function handleClick(e){
  const btn=e.target.closest('[data-action]');
  if(!btn){attachEvents();return;}
  const action=btn.dataset.action;

  if(action==='nav'){
    view=btn.dataset.value;
    quizSel=null; quizDone=false;
    render();
  } else if(action==='goto-level'){
    const lid=parseInt(btn.dataset.value);
    if(unlocked(lid)){selLevel=lid; view='level'; render();}
  } else if(action==='goto-level-back'){
    view='level'; quizSel=null; quizDone=false; render();
  } else if(action==='goto-mission'){
    selMission=btn.dataset.mid;
    quizSel=null; quizDone=false;
    view='mission'; render();
  } else if(action==='quiz'){
    if(quizDone){attachEvents();return;}
    quizSel=parseInt(btn.dataset.i);
    const m=LEVELS.flatMap(l=>l.missions).find(x=>x.id===selMission);
    quizDone=true;
    render();
  } else if(action==='complete'){
    const l=LEVELS.find(lv=>lv.missions.find(m=>m.id===selMission));
    const m=l.missions.find(x=>x.id===selMission);
    if(!done(m.id)){
      progress.completed.push(m.id);
      progress.xp+=m.xp;
      if(levelDone(l.id)&&!progress.badges.includes(l.badge)){
        progress.badges.push(l.badge);
      }
      saveProgress();
    }
    render();
  } else {
    attachEvents();
  }
}

window.filterCheat=function(query){
  const q=query.toLowerCase().trim();
  const content=document.getElementById('cheat-content');
  if(!content) return;
  if(!q){
    content.innerHTML=CHEATSHEET.map(cat=>`
      <div class="cheat-cat">${cat.cat}</div>
      ${cat.items.map(item=>`
        <div class="cheat-row">
          <div class="cheat-cmd">${item.cmd}</div>
          <div class="cheat-desc">${item.desc}</div>
        </div>`).join('')}
    `).join('');
    return;
  }
  let results='';
  CHEATSHEET.forEach(cat=>{
    const matches=cat.items.filter(item=>
      item.cmd.toLowerCase().includes(q)||item.desc.toLowerCase().includes(q)
    );
    if(matches.length){
      results+=`<div class="cheat-cat">${cat.cat}</div>`;
      matches.forEach(item=>{
        results+=`<div class="cheat-row">
          <div class="cheat-cmd">${item.cmd}</div>
          <div class="cheat-desc">${item.desc}</div>
        </div>`;
      });
    }
  });
  content.innerHTML=results||`<div style="padding:20px;text-align:center;color:var(--muted)">No results for "${query}"</div>`;
};

// ═══════════════════════════════════════════════════

render();
</script>
